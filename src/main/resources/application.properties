spring.application.name=online-shop

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/online_shop_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:default-secret-key}
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# Midtrans
midtrans.server-key=${MIDTRANS_SERVER_KEY:}
midtrans.client-key=${MIDTRANS_CLIENT_KEY:}
midtrans.snap-url=https://app.sandbox.midtrans.com/snap/v1/transactions